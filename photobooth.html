    <div class="container">

        <video autoplay id="video"></video>

        <div class="controls">
            <input type="number" min="0" placeholder="Timer (Sec)" id="timer" />
            <button id="capture-btn">Capture</button>
        </div>
        <div id="photos"></div>
        
    </div>

    <script type="text/javascript">
        var video = document.getElementById("video");
        var captureBtn = document.getElementById("capture-btn");
        var photosContainer = document.getElementById("photos");
        var timerInput = document.getElementById("timer");

        //Accessthe camera and stream to video
        navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
            video.srcObject = stream;
        });

        // Capture photo with timer
        captureBtn.addEventListener("click", () => {
            var timer = timerInput.value - 1;
            if (timer > 0){
                captureBtn.disabled = true;

                    captureBtn.textContent = `Capture (${timer})`;
                    if (timer <= 0){
                        clearInterval(countdown);
                        captureBtn.textContent = "Capture";
                        captureBtn.disabled = false;
                        capturePhoto();
                    }
                    timer--;
                }, 1000);
            } else{
                capturePhoto();
            }

        function capturePhoto(){
            var canvas = document.createElement("canvas");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            var dataURL = canvas.toDataURL("image/png");

            // Create image list from captured photo
            var photoDiv = document.createElement("div");
            photoDiv.classList.add("photo");

                a.href = dataURL;
                a.download = "photo.png";
                a.click();
            });

            photoDiv.appendChild(downloadBtn);
            photosContainer.appendChild(photoDiv);
        }

<!DOCTYPE html>
<html>
<body>

<p>Image to use:</p>
<img id="scream" src="img_the_scream.png" alt="The Scream" width="220" height="277">

<p>Canvas to fill:</p>
<canvas id="myCanvas" width="250" height="300"
style="border:1px solid #d3d3d3;">
Your browser does not support the HTML canvas tag.</canvas>

<p><button onclick="myCanvas()">Try it</button></p>

<script>
function myCanvas() {
  var c = document.getElementById("myCanvas");
  var ctx = c.getContext("2d");
  var img = document.getElementById("scream");
  ctx.drawImage(img,10,10);
}
</script>

</body>
</html>
